image: docker:28.2.2
services:
  - name: docker:28.2.2-dind
    command: [ "--tls=false", "--mtu=1240" ]
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  REGISTRY_URL: "registry.nosi.cv"
  IMAGE_NAME: "access-management-api"
  CI_PROJECT: "igrp"
  VERSION_TAG: "$CI_COMMIT_SHORT_SHA"
  IMAGE_NAME_FULL: "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME"
  IMAGE_TAG: latest


stages:
  - build
  - manifest

.build-template:
  only:
    - deploy/base
  before_script:
    - apk add --no-cache curl bash
    - docker login -u "$BASE_REGISTRY_USERNAME" -p "$BASE_REGISTRY_PASSWORD" "$REGISTRY_URL"

build-arm64:
  stage: build
  extends: .build-template
  script:
    - docker buildx create --use --name amd64builder
    - docker buildx inspect --bootstrap
    - docker buildx build --platform linux/arm64 -t $IMAGE_NAME_FULL:arm64 --push .
  tags:
    - arm64
  only:
    - deploy/base

build-amd64:
  extends: .build-template
  stage: build
  script:
    - docker buildx create --use --name amd64builder
    - docker buildx inspect --bootstrap
    - docker buildx build --platform linux/amd64 -t $IMAGE_NAME_FULL:amd64 --push .
  only:
    - deploy/base

create-manifest:
  stage: manifest
  script:
    - docker login -u "$BASE_REGISTRY_USERNAME" -p "$BASE_REGISTRY_PASSWORD" "$REGISTRY_URL"
    - docker manifest create "$IMAGE_NAME_FULL:$IMAGE_TAG" "$IMAGE_NAME_FULL:amd64" "$IMAGE_NAME_FULL:arm64"
    - docker manifest push $IMAGE_NAME_FULL:$IMAGE_TAG
  needs:
    - build-amd64
    - build-arm64


build_docker_image_base_temp_dev:
  stage: build
  only:
    - deploy-temp
  script:
    - docker login $REGISTRY_URL -u "$BASE_REGISTRY_USERNAME" -p "$BASE_REGISTRY_PASSWORD"
    - docker build -f Dockerfile_temp -t $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:$CI_PIPELINE_ID .
    - docker tag $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:$CI_PIPELINE_ID $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:latest
    - docker push $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:$CI_PIPELINE_ID
    - docker push $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:latest

build_docker_image_inss_dev:
  stage: build
  only:
    - deploy-inss
  script:
    - docker login $REGISTRY_URL -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
    - docker buildx build --platform $TARGETPLATFORMS -t $REGISTRY_URL/$REGISTRY_PROJECT/access-management-api-dev:$CI_PIPELINE_ID --push .
