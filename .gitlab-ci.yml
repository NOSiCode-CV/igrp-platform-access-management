image: docker:28.2.2
services:
  - name: docker:28.2.2-dind
    command: [ "--tls=false", "--mtu=1240" ]
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  REGISTRY_URL: "registry.nosi.cv"
  IMAGE_NAME: "access-management-api"
  CI_PROJECT: "igrp"
  VERSION_TAG: "$CI_COMMIT_SHORT_SHA"


stages:
  - build
  - manifest

.build-template: &build-template
  stage: build
  only:
    - deploy/base
  script:
    - docker login -u "$BASE_REGISTRY_USERNAME" -p "$BASE_REGISTRY_PASSWORD" "$REGISTRY_URL"
    - |
      docker buildx build \
        --platform $PLATFORM \
        -t "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$CI_PIPELINE_ID" \
        -t "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:latest-$ARCH" \
        --build-arg SPRING_ACTIVE_PROFILE=cicd \
        --push \
        .
  cache:
    key: "docker-cache-$ARCH"
    paths:
      - .cache

build-arm64:
  <<: *build-template
  variables:
    PLATFORM: "linux/arm64"
    ARCH: "arm64"
  tags:
    - arm64
  only:
    - deploy/base

build-amd64:
  <<: *build-template
  variables:
    PLATFORM: "linux/amd64"
    ARCH: "amd64"
  only:
    - deploy/base

create-manifest:
  stage: manifest
  only:
    - deploy/base
  needs:
    - build-arm64
    - build-amd64
  script:
    - docker login -u "$BASE_REGISTRY_USERNAME" -p "$BASE_REGISTRY_PASSWORD" "$REGISTRY_URL"
    - |
      # Create and push versioned manifest
      docker manifest create \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-arm64" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-amd64"

      docker manifest annotate \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-arm64" \
        --arch arm64

      docker manifest annotate \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-amd64" \
        --arch amd64

      docker manifest push "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG"

    - |
      # Create and push latest manifest
      docker manifest create \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:latest" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-arm64" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-amd64"

      docker manifest annotate \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:latest" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-arm64" \
        --arch arm64

      docker manifest annotate \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:latest" \
        "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG-amd64" \
        --arch amd64

      docker manifest push "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:latest"

    - |
      # Verify manifests
      echo "Versioned manifest:"
      docker manifest inspect "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:$VERSION_TAG"
      echo "Latest manifest:"
      docker manifest inspect "$REGISTRY_URL/$CI_PROJECT/$IMAGE_NAME:latest"

build_docker_image_base_temp_dev:
  stage: build
  only:
    - deploy-temp
  script:
    - docker login $REGISTRY_URL -u "$BASE_REGISTRY_USERNAME" -p "$BASE_REGISTRY_PASSWORD"
    - docker build -f Dockerfile_temp -t $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:$CI_PIPELINE_ID .
    - docker tag $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:$CI_PIPELINE_ID $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:latest
    - docker push $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:$CI_PIPELINE_ID
    - docker push $REGISTRY_URL/$BASE_REGISTRY_PROJECT/access-management-api:latest

build_docker_image_inss_dev:
  stage: build
  only:
    - deploy-inss
  script:
    - docker login $REGISTRY_URL -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
    - docker buildx build --platform $TARGETPLATFORMS -t $REGISTRY_URL/$REGISTRY_PROJECT/access-management-api-dev:$CI_PIPELINE_ID --push .
