# General
spring.config.import=optional:file:.env[.properties]

server.port=${SERVICE_PORT:8080}

# Application name
spring.application.name=igrp-access-management
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
spring.cloud.discovery.enabled=${SPRING_CLOUD_DISCOVERY_ENABLED:false}

spring.cloud.refresh.enabled=false
spring.autoconfigure.exclude=org.springframework.cloud.autoconfigure.RefreshAutoConfiguration

springdoc.swagger-ui.docExpansion=none

# Datasource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:postgres}}
spring.datasource.username=${DATABASE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.hibernate.ddl-auto=update

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_JWT_ISSUER}

# =============================================================================
# OAuth2 Authorization Server (issuing tokens for iGRP clients)
# =============================================================================
igrp.oauth.issuer=${IGRP_OAUTH_ISSUER:http://localhost:${server.port:8080}}
igrp.oauth.keys.public=${IGRP_OAUTH_PUBLIC_KEY:classpath:keys/public.pem}
igrp.oauth.keys.private=${IGRP_OAUTH_PRIVATE_KEY:classpath:keys/private.pem}
igrp.oauth.keys.kid=${IGRP_OAUTH_KEY_ID:igrp-oauth-key}

# Default seeded client (skipped automatically when secret is blank)
igrp.oauth.default-client.client-id=${IGRP_OAUTH_DEFAULT_CLIENT_ID:igrp-access-management}
igrp.oauth.default-client.secret=${IGRP_OAUTH_DEFAULT_CLIENT_SECRET:}
igrp.oauth.default-client.access-token-ttl=${IGRP_OAUTH_DEFAULT_CLIENT_ACCESS_TOKEN_TTL:3600}
igrp.oauth.default-client.refresh-token-ttl=${IGRP_OAUTH_DEFAULT_CLIENT_REFRESH_TOKEN_TTL:86400}
igrp.oauth.default-client.authorization-code-ttl=${IGRP_OAUTH_DEFAULT_CLIENT_AUTHORIZATION_CODE_TTL:300}
igrp.oauth.default-client.redirect-uri=${IGRP_OAUTH_DEFAULT_CLIENT_REDIRECT_URI:}

# Optional federation to an external IdP (Keycloak / WSO2 / etc.). Disabled by default.
# When enabling, set the env vars below and activate `igrp.oauth.external-idp.enabled=true`.
igrp.oauth.external-idp.enabled=${IGRP_OAUTH_EXTERNAL_IDP_ENABLED:true}
spring.security.oauth2.client.registration.external-idp.client-id=${IGRP_OAUTH_EXTERNAL_IDP_CLIENT_ID}
spring.security.oauth2.client.registration.external-idp.client-secret=${IGRP_OAUTH_EXTERNAL_IDP_CLIENT_SECRET}
spring.security.oauth2.client.registration.external-idp.scope=openid,profile,email
spring.security.oauth2.client.registration.external-idp.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.external-idp.redirect-uri=${IGRP_OAUTH_EXTERNAL_IDP_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.provider.external-idp.issuer-uri=${IGRP_OAUTH_EXTERNAL_IDP_ISSUER_URI}

# Documentation
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER:true}
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.showExtensions=true

# Storage
igrp.storage-provider=${IGRP_STORAGE_PROVIDER:minio}
igrp.minio.endpoint=${IGRP_STORAGE_ENDPOINT}
igrp.minio.port=${IGRP_STORAGE_PORT}
igrp.minio.security=${IGRP_STORAGE_SECURITY}
igrp.minio.access-key=${IGRP_STORAGE_ACCESS_KEY}
igrp.minio.secret-key=${IGRP_STORAGE_SECRET_KEY}
igrp.minio.bucket-name=${IGRP_STORAGE_BUCKET_NAME:igrp}
igrp.minio.url-expiration-time=${IGRP_STORAGE_PRESIGNED_URL_EXPIRATION_TIME:300}
igrp.minio.region=${IGRP_STORAGE_REGION:us-east-1}
igrp.s3.aws-endpoint=http://${IGRP_STORAGE_ENDPOINT}:${IGRP_STORAGE_PORT}
igrp.s3.aws-access-key=${IGRP_STORAGE_ACCESS_KEY}
igrp.s3.aws-secret-key=${IGRP_STORAGE_SECRET_KEY}
igrp.s3.secure=${IGRP_STORAGE_SECURITY}
igrp.s3.aws-bucket=${IGRP_STORAGE_BUCKET_NAME:igrp}
igrp.s3.aws-url-expiration-time=${IGRP_STORAGE_PRESIGNED_URL_EXPIRATION_TIME:300}
igrp.s3.aws-region=${IGRP_STORAGE_REGION:us-east-1}
igrp.s3.aws-path-style-access=${IGRP_STORAGE_PATH_STYLE_ACCESS:true}
# File manager Logging - Minio/S3
logging.level.io.minio=DEBUG
logging.level.io.awss3=DEBUG
logging.level.cv.igrp.platform.filemanager=DEBUG


spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
management.health.redis.enabled=false

# SMTP
igrp.notifications.enabled=${IGRP_NOTIFICATIONS_ENABLED:none}
igrp.mail.host=${SMTP_HOST:disabled}
igrp.mail.port=${SMTP_PORT:587}
igrp.mail.username=${SMTP_USERNAME:disabled}
igrp.mail.password=${SMTP_PASSWORD:disabled}
igrp.mail.properties.sender-id=${SMTP_SENDER_ID:iam@igrp.cv}
# SMTP transport security (mapped onto spring.mail.properties.mail.smtp.*)
igrp.mail.auth=${IGRP_MAIL_SMTP_AUTH:true}
igrp.mail.starttls.enable=${IGRP_MAIL_SMTP_STARTTLS_ENABLE:true}
igrp.mail.starttls.required=${IGRP_MAIL_SMTP_STARTTLS_REQUIRED:true}

igrp.mail.invite.template=${IGRP_MAIL_INVITE_TEMPLATE:Hello {{user}}, you were successfully invited to iGRP! Please click on the link below to accept the invitation: {{url}} }
igrp.mail.invite.response.template=${IGRP_MAIL_INVITE_RESPONSE_TEMPLATE:Hello {{user}}, you accepted the invite to the iGRP platform successfully. You can now login using your email and password.}
igrp.mail.invite.cancellation.template=${IGRP_MAIL_INVITE_CANCELLATION_TEMPLATE:Hello {{user}}, your invitation to the iGRP platform was cancelled. If you have any questions, please contact the administrator.}

igrp.superadmin.user-external-id=${IGRP_SUPERADMIN_USER_EXTERNAL_ID}
igrp.superadmin.email=${IGRP_SUPERADMIN_EMAIL:superadmin@igrp.cv}

# Observability
otel.resource.attributes.service.name=${spring.application.name}
otel.resource.attributes.deployment.environment=${SPRING_PROFILES_ACTIVE:development}
otel.logs.exporter=otlp
otel.metrics.exporter=otlp
otel.traces.exporter=otlp
otel.exporter.otlp.endpoint=${OTEL_COLLECTOR_ENDPOINT}
otel.sdk.disabled=${OTEL_DISABLED:true}

# User Invitation
igrp.app-center.url=${IGRP_APP_CENTER_URL}

# =============================================================================
# Session Management — Phase B (JWT ↔ Session binding)
# =============================================================================
# Absolute session lifetime ceiling in seconds (default: 8 hours).
igrp.session.absolute-timeout-seconds=${IGRP_SESSION_ABSOLUTE_TIMEOUT_SECONDS:28800}
# Max concurrent ACTIVE sessions per user across distinct devices (default: 5).
igrp.session.max-per-user=${IGRP_SESSION_MAX_PER_USER:5}
# Min interval between last_seen_at heartbeat writes (default: 30 seconds).
igrp.session.heartbeat-debounce-seconds=${IGRP_SESSION_HEARTBEAT_DEBOUNCE_SECONDS:30}
# Phase C — server-side session enforcement on the resource-server chain.
# Disable in emergency to bypass SessionEnforcementFilter (e.g. during a
# Redis+DB outage that would otherwise produce a 401-storm).
igrp.session.enforcement-enabled=${IGRP_SESSION_ENFORCEMENT_ENABLED:true}
