# General
spring.config.import=optional:file:.env[.properties]

# JPA and Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.bytecode.provider=bytebuddy
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Spring Data REST
spring.data.rest.detection-strategy=annotated

# Swagger
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER:false}
springdoc.swagger-ui.operationsSorter=method

# Actuator
management.info.git.mode=full
management.endpoints.web.exposure.include=resources,*

# show full health details
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true

# Spring Cloud
spring.cloud.kubernetes.discovery.enabled=true

# Disable Eureka client
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Spring Cloud discovery autoconfiguration for Eureka
spring.cloud.discovery.enabled=false