# General
spring.config.import=optional:file:.env[.properties]

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_JWT_ISSUER}

# Datasource configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate settings
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.bytecode.provider=bytebuddy
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
# Entity Revision
# Track entity names modified during revision
#spring.jpa.properties.org.hibernate.envers.track_entities_changed_in_revision=true
# Enable withModifiedFlag globally
#spring.jpa.properties.org.hibernate.envers.global_with_modified_flag=true
# Set schema and catalog for audit tables
#spring.jpa.properties.org.hibernate.envers.default_schema=audit_schema

# Spring Data REST
spring.data.rest.detection-strategy=annotated

# Swagger
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER:false}
springdoc.swagger-ui.operationsSorter=method

# Email Configuration
spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=IGRP.Notification@gov.cv
spring.mail.password=C@boverde25
spring.mail.properties.sender-id=iam@igrp.cv

# Observability
management.info.git.mode=full
management.endpoints.web.exposure.include=resources,*
management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=false
management.tracing.sampling.probability=1.0
# show full health details
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Minio
igrp.minio.url=${MINIO_URL}
igrp.minio.port=${MINIO_PORT}
igrp.minio.security=${MINIO_SECURITY}
igrp.minio.access-key=${MINIO_ACCESS_KEY}
igrp.minio.secret-key=${MINIO_SECRET_KEY}
igrp.minio.bucket-name=${MINIO_BUCKET_NAME}
igrp.minio.url-expiration-time=${MINIO_PRESIGNED_URL_EXPIRATION_TIME:60}

# Spring Cloud
spring.cloud.kubernetes.discovery.enabled=true

# Disable Eureka client
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Spring Cloud discovery autoconfiguration for Eureka
spring.cloud.discovery.enabled=false