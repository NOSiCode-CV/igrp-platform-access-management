name: DEV Pipeline

on:
  push:
    branches:
      - deploy/base

env:
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

jobs:
  build-base:
    if: github.ref == 'refs/heads/deploy/base'
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
    runs-on: ${{ matrix.runner }}
    env:
      PROJECT: ${{ secrets.BASE_REGISTRY_PROJECT }}
      IMAGE: access-management-api
      TAG: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      #- name: Set up QEMU
        #uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY_URL }}/${{ env.PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }}-${{ matrix.arch }}
          #build-args: |
            #SPRING_ACTIVE_PROFILE=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-manifest:
    needs: build-base
    runs-on: ubuntu-latest
    env:
      PROJECT: ${{ secrets.BASE_REGISTRY_PROJECT }}
      IMAGE: access-management-api
      TAG: ${{ github.run_id }}
    steps:
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create multi-arch manifest
        run: |
          docker manifest create \
            ${{ env.REGISTRY_URL }}/${{ env.PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }} \
            ${{ env.REGISTRY_URL }}/${{ env.PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }}-amd64 \
            ${{ env.REGISTRY_URL }}/${{ env.PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }}-arm64
          docker manifest push ${{ env.REGISTRY_URL }}/${{ env.PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }}